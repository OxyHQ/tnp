name: Build & Release TNP Client

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd packages/client && bun install

      - name: Build all platforms
        run: |
          cd packages/client
          mkdir -p dist
          bun build src/cli.ts --compile --target=bun-linux-x64 --outfile dist/tnp-linux-x64
          bun build src/cli.ts --compile --target=bun-linux-arm64 --outfile dist/tnp-linux-arm64
          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile dist/tnp-darwin-x64
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile dist/tnp-darwin-arm64
          bun build src/cli.ts --compile --target=bun-windows-x64 --outfile dist/tnp-win32-x64.exe

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: TNP Client v0.1.0
          body: |
            TNP DNS resolver daemon v0.1.0

            **Install:**
            ```
            # macOS / Linux
            curl -fsSL https://tnp.network/install.sh | sh

            # Windows (PowerShell as Administrator)
            irm https://tnp.network/install.ps1 | iex
            ```
          files: |
            packages/client/dist/tnp-linux-x64
            packages/client/dist/tnp-linux-arm64
            packages/client/dist/tnp-darwin-x64
            packages/client/dist/tnp-darwin-arm64
            packages/client/dist/tnp-win32-x64.exe
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
