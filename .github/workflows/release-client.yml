name: Build & Release TNP Client

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
  workflow_dispatch:

env:
  VERSION: "0.2.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all platforms
        run: |
          cd packages/client
          mkdir -p dist
          bun build src/cli.ts --compile --target=bun-linux-x64 --outfile dist/tnp-linux-x64
          bun build src/cli.ts --compile --target=bun-linux-arm64 --outfile dist/tnp-linux-arm64
          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile dist/tnp-darwin-x64
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile dist/tnp-darwin-arm64
          bun build src/cli.ts --compile --target=bun-windows-x64 --outfile dist/tnp-windows-x64.exe

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TNP Client v${{ env.VERSION }}
          body: |
            TNP Client v${{ env.VERSION }} — overlay network with encrypted tunnels

            **Install (one command):**
            ```bash
            # macOS / Linux
            curl -fsSL https://get.tnp.network | sh

            # Windows (PowerShell)
            irm https://get.tnp.network/ps | iex
            ```

            **Platforms:** linux-x64, linux-arm64, darwin-x64, darwin-arm64, windows-x64

            **What's new:**
            - Interactive CLI menu (`tnp` with no args)
            - Overlay network: SOCKS5 proxy + encrypted WebSocket tunnels
            - Service node mode (`tnp serve`)
            - Become a relay node from the menu
            - Cross-platform installer scripts
          files: |
            packages/client/dist/tnp-linux-x64
            packages/client/dist/tnp-linux-arm64
            packages/client/dist/tnp-darwin-x64
            packages/client/dist/tnp-darwin-arm64
            packages/client/dist/tnp-windows-x64.exe
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
